<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Signing in... – DMFlow</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700;800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Instrument Sans',sans-serif;background:#F8F8FC;display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;}
.logo{font-family:'Bricolage Grotesque',sans-serif;font-size:24px;font-weight:800;color:#0A0A0F;margin-bottom:8px;}
.logo span{color:#7C3AED;}
.spinner{width:40px;height:40px;border:3px solid #E2E2EA;border-top-color:#7C3AED;border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.msg{font-size:15px;color:#5A5A6E;font-weight:500;}
.error-box{background:#fff;border:1.5px solid #ef4444;border-radius:12px;padding:20px 28px;text-align:center;max-width:360px;}
.error-box h2{color:#ef4444;font-size:16px;margin-bottom:8px;}
.error-box p{font-size:13px;color:#5A5A6E;margin-bottom:14px;}
.error-box a{display:inline-block;padding:9px 20px;background:#0A0A0F;color:#fff;border-radius:8px;font-size:13px;font-weight:600;text-decoration:none;}
</style>
</head>
<body>
<div class="logo">DM<span>Flow</span></div>
<div class="spinner" id="spinner"></div>
<div class="msg" id="msg">Completing sign in...</div>
<div class="error-box" id="errorBox" style="display:none;">
  <h2>Sign in failed</h2>
  <p id="errorMsg">Something went wrong. Please try again.</p>
  <a href="login.html">Back to Login</a>
</div>

<script src="../js/api.js"></script>
<script>
(function() {
  // Backend redirects here with ?token=JWT&provider=google after Google OAuth
  const urlParams = new URLSearchParams(window.location.search);
  const token    = urlParams.get('token');
  const error    = urlParams.get('error');

  if (error) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('msg').style.display = 'none';
    document.getElementById('errorBox').style.display = '';
    document.getElementById('errorMsg').textContent = 'Google sign-in was cancelled or failed.';
    return;
  }

  if (token) {
    API.setToken(token);
    document.getElementById('msg').textContent = 'Getting your profile...';
    // Fetch user from backend with the JWT
    API.getMe()
      .then(user => {
        localStorage.setItem('dmflow_user', JSON.stringify({
          ...user, plan: user.plan || 'Free'
        }));
        document.getElementById('msg').textContent = 'Welcome ' + user.name + '! Redirecting...';
        setTimeout(() => {
          window.location.href = user.instagram?.connected ? 'dashboard.html' : 'connect.html';
        }, 800);
      })
      .catch(() => {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('msg').style.display = 'none';
        document.getElementById('errorBox').style.display = '';
        document.getElementById('errorMsg').textContent = 'Could not load your profile. Try again.';
      });
  } else {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('msg').style.display = 'none';
    document.getElementById('errorBox').style.display = '';
  }
})();
</script>
</body>
</html>
