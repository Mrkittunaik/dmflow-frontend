<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Connecting Instagram – DMFlow</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700;800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Instrument Sans',sans-serif;background:#F8F8FC;display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;}
.logo{font-family:'Bricolage Grotesque',sans-serif;font-size:24px;font-weight:800;color:#0A0A0F;margin-bottom:8px;}
.logo span{color:#7C3AED;}
.ig-icon{width:56px;height:56px;background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);border-radius:14px;display:flex;align-items:center;justify-content:center;}
.ig-icon svg{width:30px;height:30px;fill:white;}
.spinner{width:40px;height:40px;border:3px solid #E2E2EA;border-top-color:#7C3AED;border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.msg{font-size:15px;color:#5A5A6E;font-weight:500;text-align:center;}
.steps{display:flex;flex-direction:column;gap:10px;width:100%;max-width:320px;margin-top:8px;}
.step{display:flex;align-items:center;gap:12px;background:#fff;border-radius:10px;padding:12px 16px;font-size:13px;font-weight:500;border:1.5px solid #E2E2EA;transition:all .4s;}
.step.done{border-color:#C8FF00;background:rgba(200,255,0,0.08);}
.step-dot{width:20px;height:20px;border-radius:50%;border:2px solid #E2E2EA;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;}
.step.done .step-dot{background:#C8FF00;border-color:#C8FF00;color:#0A0A0F;font-weight:700;}
.error-box{background:#fff;border:1.5px solid #ef4444;border-radius:12px;padding:20px 28px;text-align:center;max-width:360px;display:none;}
.error-box h2{color:#ef4444;font-size:16px;margin-bottom:8px;}
.error-box p{font-size:13px;color:#5A5A6E;margin-bottom:14px;}
.error-box a{display:inline-block;padding:9px 20px;background:#0A0A0F;color:#fff;border-radius:8px;font-size:13px;font-weight:600;text-decoration:none;}
</style>
</head>
<body>
<div class="logo">DM<span>Flow</span></div>
<div class="ig-icon"><svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg></div>
<div class="spinner" id="spinner"></div>
<div class="msg" id="msg">Connecting your Instagram...</div>

<div class="steps" id="stepsWrap">
  <div class="step" id="s1"><div class="step-dot" id="d1">1</div> Verifying authorization</div>
  <div class="step" id="s2"><div class="step-dot" id="d2">2</div> Exchanging access token</div>
  <div class="step" id="s3"><div class="step-dot" id="d3">3</div> Loading account details</div>
  <div class="step" id="s4"><div class="step-dot" id="d4">✓</div> All done!</div>
</div>

<div class="error-box" id="errorBox">
  <h2>Connection failed</h2>
  <p id="errorMsg">Instagram connection was cancelled or failed. Please try again.</p>
  <a href="connect.html">Try Again</a>
</div>

<script src="../js/api.js"></script>
<script>
(function() {
  const urlParams = new URLSearchParams(window.location.search);
  // Backend redirects here with ?igData=JSON after exchanging code for token
  const igDataRaw = urlParams.get('igData');
  const error     = urlParams.get('error');

  function doneStep(n, delay) {
    setTimeout(() => {
      document.getElementById('s'+n).classList.add('done');
      document.getElementById('d'+n).textContent = '✓';
    }, delay);
  }

  if (error || !igDataRaw) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('stepsWrap').style.display = 'none';
    document.getElementById('msg').style.display = 'none';
    document.getElementById('errorBox').style.display = '';
    if (error === 'access_denied') {
      document.getElementById('errorMsg').textContent = 'You denied the Instagram permissions. Please try again and approve all permissions.';
    }
    return;
  }

  doneStep(1, 400);
  doneStep(2, 900);

  try {
    const igData = JSON.parse(decodeURIComponent(igDataRaw));

    // Save Instagram token to backend (links to logged-in user via JWT)
    API.saveInstagram(igData).then(() => {
      // Update local user object
      const user = JSON.parse(localStorage.getItem('dmflow_user') || '{}');
      user.igUsername  = igData.username;
      user.igConnected = true;
      user.instagram   = { connected: true, username: igData.username };
      localStorage.setItem('dmflow_user', JSON.stringify(user));

      doneStep(3, 0);
      setTimeout(() => {
        doneStep(4, 0);
        document.getElementById('msg').textContent = 'Instagram connected! Redirecting...';
        document.getElementById('spinner').style.display = 'none';
      }, 600);
      setTimeout(() => { window.location.href = 'onboarding.html'; }, 1400);
    }).catch(() => {
      document.getElementById('errorBox').style.display = '';
      document.getElementById('errorMsg').textContent = 'Could not save Instagram connection. Please try again.';
    });
  } catch(e) {
    document.getElementById('errorBox').style.display = '';
  }
})();
</script>
</body>
</html>
