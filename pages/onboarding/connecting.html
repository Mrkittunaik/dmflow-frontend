<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Connecting – DMFlow</title>
<link rel="icon" type="image/svg+xml" href="../../favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body>
<div style="position:fixed;top:16px;left:16px;z-index:9999;"><a href="javascript:history.back()" style="display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:600;color:#5A5A6E;text-decoration:none;padding:6px 12px;border:1px solid #E2E2EA;border-radius:8px;background:#fff;cursor:pointer;transition:all .15s;" onmouseover="this.style.background='#F4F4F8'" onmouseout="this.style.background='#fff'"><svg width="14" height="14" fill="none" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg> Back</a></div>
<div class="connecting-page">
  <div class="step-progress">
    <div class="prog-step done">
      <div class="prog-dot done">✓</div>
      Account
    </div>
    <div class="prog-line" style="background:var(--lime);"></div>
    <div class="prog-step done">
      <div class="prog-dot done">✓</div>
      Instagram
    </div>
    <div class="prog-line"></div>
    <div class="prog-step active">
      <div class="prog-dot" style="border-color:var(--black);color:var(--black);">3</div>
      Setup
    </div>
  </div>
  <div class="connecting-spinner">
    <div class="spinner-inner"></div>
  </div>
  <div class="connecting-title" id="connectTitle">Connecting Instagram...</div>
  <div class="connecting-sub" id="connectSub">Please wait while we connect your Instagram account...</div>

  <!-- Status steps -->
  <div style="margin-top:32px;display:flex;flex-direction:column;gap:10px;width:100%;max-width:340px;">
    <div class="connect-status-step" id="cstep1">
      <span class="cstep-icon" id="icon1">⏳</span>
      <span class="cstep-text">Verifying Instagram account</span>
    </div>
    <div class="connect-status-step" id="cstep2" style="opacity:0.4;">
      <span class="cstep-icon" id="icon2">⏳</span>
      <span class="cstep-text">Connecting Meta API</span>
    </div>
    <div class="connect-status-step" id="cstep3" style="opacity:0.4;">
      <span class="cstep-icon" id="icon3">⏳</span>
      <span class="cstep-text">Setting up automations</span>
    </div>
    <div class="connect-status-step" id="cstep4" style="opacity:0.4;">
      <span class="cstep-icon" id="icon4">⏳</span>
      <span class="cstep-text">Ready!</span>
    </div>
  </div>
</div>

<style>
.connect-status-step {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--gray-50);
  border-radius: 10px;
  padding: 12px 16px;
  font-size: 14px;
  color: var(--text);
  transition: all .4s;
}
.cstep-icon { font-size: 16px; }
.cstep-text { font-weight: 500; }

/* ── SIDEBAR OVERRIDES ── */
.sb-link{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;font-size:13px;font-weight:500;color:#2A2A3A;text-decoration:none;transition:background .2s,color .2s;cursor:pointer;user-select:none;white-space:nowrap;}
.sb-link:hover{background:#EBEBF0;color:#0A0A0F;}
.sb-link.active{background:#0A0A0F!important;color:#fff!important;font-weight:700;border-left:3px solid #C8FF00;padding-left:7px;}
.sb-link.active svg{opacity:1;stroke:#fff;}
.sb-link svg{flex-shrink:0;opacity:.7;}
.sb-section{font-size:10px;font-weight:800;color:#888;letter-spacing:.8px;padding:6px 12px 2px;text-transform:uppercase;}
.sb-disabled{opacity:.4;cursor:not-allowed;pointer-events:none;display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;font-size:13px;font-weight:500;color:#2A2A3A;}
.sb-disabled svg{flex-shrink:0;opacity:.5;}
.sb-soon{margin-left:auto;font-size:9px;font-weight:700;background:#F0F0F5;color:#9898A8;padding:2px 7px;border-radius:10px;}
@keyframes sb-pop{0%{transform:translateX(-6px);opacity:0}100%{transform:translateX(0);opacity:1}}
.sb-link.active{animation:sb-pop .2s ease;}
</style>

<script>
const steps = [
  { el: 'cstep1', icon: 'icon1', delay: 600 },
  { el: 'cstep2', icon: 'icon2', delay: 1400 },
  { el: 'cstep3', icon: 'icon3', delay: 2200 },
  { el: 'cstep4', icon: 'icon4', delay: 2900 },
];
steps.forEach(({ el, icon, delay }, i) => {
  setTimeout(() => {
    const stepEl = document.getElementById(el);
    const iconEl = document.getElementById(icon);
    stepEl.style.opacity = '1';
    stepEl.style.background = 'rgba(200,255,0,0.12)';
    stepEl.style.border = '1.5px solid var(--lime)';
    iconEl.textContent = '✓';
  }, delay);
});
setTimeout(() => {
  document.getElementById('connectTitle').textContent = 'Instagram Connected! 🎉';
  document.getElementById('connectSub').textContent = 'Redirecting to setup...';
}, 3000);
setTimeout(() => {
  window.location.href = 'onboarding.html';
}, 4000);

// ── Sidebar nav active on click ──
document.querySelectorAll('.sb-nav .sb-link[href]').forEach(function(link){
  link.addEventListener('click', function(){
    document.querySelectorAll('.sb-nav .sb-link').forEach(function(l){ l.classList.remove('active'); });
    link.classList.remove('active');
    void link.offsetWidth; // force reflow so animation replays
    link.classList.add('active');
  });
});

</script>
</body>
</html>
